<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="15가지 디자인 툴을 담는 종합 CSS 유틸리티 허브" />
    <title>CSS Utility Hub — 디자인 툴 모음</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/hub.css" />
    <link rel="stylesheet" href="assets/css/index.css" />
    <link rel="stylesheet" href="assets/css/footer.css" />
    <script>
      (function () {
        try {
          if (localStorage.getItem("glass-theme") === "light")
            document.documentElement.setAttribute("data-theme", "light");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div class="hub-shell" id="hub-shell">
      <div class="hub-drawer-backdrop" id="hub-backdrop" hidden></div>

      <aside class="hub-sidebar" id="hub-sidebar" aria-label="도구 메뉴">
        <div class="hub-sidebar__top">
          <div class="hub-brand" role="banner">
            <span class="hub-brand__logo" aria-hidden="true"></span>
            <div class="hub-brand__text">
              <div class="hub-brand__name">CSS Utility Hub</div>
              <div class="hub-brand__sub">Design tools · SPA</div>
            </div>
          </div>
        </div>

        <nav class="hub-nav" aria-label="카테고리별 도구 목록">
          <div class="hub-nav__group">
            <div class="hub-nav__title">트렌디 UI</div>
            <button class="hub-nav__item is-active" type="button" data-tool="glass">
              글래스모피즘
            </button>
            <button class="hub-nav__item" type="button" data-tool="neumorphism">뉴모피즘</button>
            <button class="hub-nav__item" type="button" data-tool="gradient">그라디언트 메이커</button>
            <button class="hub-nav__item" type="button" data-tool="mesh">메쉬 그라디언트</button>
            <button class="hub-nav__item" type="button" data-tool="pattern">패턴 생성기</button>
          </div>

          <div class="hub-nav__group">
            <div class="hub-nav__title">레이아웃</div>
            <button class="hub-nav__item" type="button" data-tool="grid">그리드 빌더</button>
            <button class="hub-nav__item" type="button" data-tool="flex">플렉스박스 빌더</button>
            <button class="hub-nav__item" type="button" data-tool="spacing">스페이싱 스케일</button>
            <button class="hub-nav__item" type="button" data-tool="container">컨테이너 계산기</button>
          </div>

          <div class="hub-nav__group">
            <div class="hub-nav__title">타이포 / 컬러</div>
            <button class="hub-nav__item" type="button" data-tool="type">타이포 스케일</button>
            <button class="hub-nav__item" type="button" data-tool="palette">팔레트 생성기</button>
            <button class="hub-nav__item" type="button" data-tool="contrast">대비 체크</button>
          </div>

          <div class="hub-nav__group">
            <div class="hub-nav__title">CSS 도우미</div>
            <button class="hub-nav__item" type="button" data-tool="shadow">섀도우 프리셋</button>
            <button class="hub-nav__item" type="button" data-tool="border">보더/라디우스</button>
            <button class="hub-nav__item" type="button" data-tool="animation">애니메이션</button>
          </div>
        </nav>
      </aside>

      <div class="hub-main">
        <header class="hub-topbar" aria-label="상단 바">
          <button
            type="button"
            class="hub-topbar__icon"
            id="hub-menu-btn"
            aria-label="메뉴 열기"
            aria-controls="hub-sidebar"
            aria-expanded="false"
          >
            <span class="hub-burger" aria-hidden="true"><span></span><span></span><span></span></span>
          </button>

          <div class="hub-topbar__title">
            <div class="hub-topbar__kicker">선택된 도구</div>
            <div class="hub-topbar__name" id="current-tool-title">글래스모피즘</div>
          </div>

          <div class="hub-topbar__actions">
            <button type="button" class="hub-topbar__icon" id="theme-toggle" aria-label="테마 전환">
              <span class="sr-only theme-toggle-label">테마 전환</span>
              <svg
                class="theme-icon--moon"
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true"
              >
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
              <svg
                class="theme-icon--sun"
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true"
              >
                <circle cx="12" cy="12" r="4" />
                <path
                  d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
                />
              </svg>
            </button>
          </div>
        </header>

        <main class="hub-content" id="hub-content">
          <div id="tool-container" class="tool-container" aria-live="polite"></div>
        </main>
      </div>
    </div>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <div class="site-footer__col">
          <p class="site-footer__meta">Glass CSS Gen</p>
          <p class="site-footer__credit">
            Designed &amp; Developed by <span lang="en">Studio Glass</span>
          </p>
        </div>
        <a class="site-footer__link" href="mailto:hello@glasscss.example">yspark004@naver.com</a>
      </div>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite">알림</div>

    <script src="assets/js/hub.js" defer></script>
    <script src="assets/js/theme.js" defer></script>
    <script src="assets/js/tools/glass.js" defer></script>
    <script src="assets/js/tools/neumorphism.js" defer></script>
    <script src="assets/js/tools/gradient.js" defer></script>
    <script src="assets/js/tools/mesh.js" defer></script>
    <script src="assets/js/tools/pattern.js" defer></script>
    <script src="assets/js/tools/grid.js" defer></script>
    <script src="assets/js/tools/flex.js" defer></script>
    <script src="assets/js/tools/spacing.js" defer></script>
    <script src="assets/js/tools/container.js" defer></script>
    <script src="assets/js/tools/type.js" defer></script>
    <script src="assets/js/tools/palette.js" defer></script>
    <script src="assets/js/tools/contrast.js" defer></script>
    <script src="assets/js/tools/shadow.js" defer></script>
    <script src="assets/js/tools/border.js" defer></script>
    <script src="assets/js/tools/animation.js" defer></script>
    <script src="assets/js/tools/coming-soon.js" defer></script>
    <script src="assets/js/app.js" defer></script>
  </body>
</html>
